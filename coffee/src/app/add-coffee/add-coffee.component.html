
<div>
    <h2>Add a personalized coffee</h2>
    <input
      type="text"
      [(ngModel)]="coffeeTitle"
      placeholder="Escribe el título del café"
    />
    <button (click)="addCoffee()">Añadir Café</button>
  
    <h3>Cafés en la lista local:</h3>
    <ul>
      <li *ngFor="let coffee of localCoffees">{{ coffee }}</li>
    </ul>
  </div>
